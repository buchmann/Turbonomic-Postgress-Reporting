apiVersion: v1
kind: Secret
metadata:
  name: kafka-postgres-consumer-secret
  namespace: turbonomic
  labels:
    app: kafka-postgres-consumer
    component: credentials
type: Opaque
data:
  # PostgreSQL credentials (base64 encoded)
  # Username: manfred (base64: bWFuZnJlZA==)
  # Password: Test7283 (base64: VGVzdDcyODM=)
  POSTGRES_USER: bWFuZnJlZA==
  POSTGRES_PASSWORD: VGVzdDcyODM=

---
# To create/update the secret with your own values, use:
# kubectl create secret generic kafka-postgres-consumer-secret \
#   --from-literal=POSTGRES_USER=manfred \
#   --from-literal=POSTGRES_PASSWORD=Test7283 \
#   --namespace=turbonomic \
#   --dry-run=client -o yaml | kubectl apply -f -

